services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: iot
      POSTGRES_PASSWORD: iot2026
      POSTGRES_DB: iot_sensor
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot -d iot_sensor"]
      interval: 5s
      timeout: 3s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_KEY: "iot2026-a7f3d2e1b8c94f5a0d6e2b1c3a4f7e9d"
        DATABASE_URL: "postgresql://iot:iot2026@postgres:5432/iot_sensor"
        API_KEY: "iot2026-a7f3d2e1b8c94f5a0d6e2b1c3a4f7e9d"
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: "postgresql://iot:iot2026@postgres:5432/iot_sensor"
      API_KEY: "iot2026-a7f3d2e1b8c94f5a0d6e2b1c3a4f7e9d"
      NEXT_PUBLIC_API_KEY: "iot2026-a7f3d2e1b8c94f5a0d6e2b1c3a4f7e9d"
    depends_on:
      postgres:
        condition: service_healthy

  sensor:
    build:
      context: ./sensor
    restart: unless-stopped
    environment:
      SENSOR_MODE: "${SENSOR_MODE:-real}"
      MQTT_BROKER: "mosquitto"
      MQTT_PORT: "1883"
      PUBLISH_INTERVAL: "1.0"
      SENSOR_ANGLE: "0"
      MAX_DISTANCE_CM: "400"
      TOLERANCE_CM: "0.5"
      API_BASE: "http://dashboard:3000/api"
      API_KEY: "iot2026-a7f3d2e1b8c94f5a0d6e2b1c3a4f7e9d"
    depends_on:
      - mosquitto
      - dashboard

  mqtt-worker:
    build:
      context: ./sensor
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      MQTT_BROKER: "mosquitto"
      MQTT_PORT: "1883"
      API_BASE: "http://dashboard:3000/api"
      API_KEY: "iot2026-a7f3d2e1b8c94f5a0d6e2b1c3a4f7e9d"
    depends_on:
      - mosquitto
      - dashboard

  simulator:
    build:
      context: ./sensor
      dockerfile: Dockerfile.simulator
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      - mosquitto

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - simulator
      - mosquitto

volumes:
  pgdata:
  mosquitto-data:
  mosquitto-log:
