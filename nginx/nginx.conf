events {
    worker_connections 1024;
}

http {
    # app.localhost -> dashboard (Next.js)
    server {
        listen 80;
        server_name app.localhost;

        location / {
            proxy_pass http://dashboard:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
    }

    # api.localhost -> dashboard API routes
    server {
        listen 80;
        server_name api.localhost;

        location / {
            proxy_pass http://dashboard:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
    }

    # simulator.localhost -> canvas simulator (Python HTTP)
    server {
        listen 80;
        server_name simulator.localhost;

        location / {
            proxy_pass http://simulator:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # mqtt.localhost -> Mosquitto WebSocket
    server {
        listen 80;
        server_name mqtt.localhost;

        location / {
            proxy_pass http://mosquitto:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
